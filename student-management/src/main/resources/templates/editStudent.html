<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#dbeafe,#bfdbfe);
}

.form-container{
background:white;
padding:40px;
width:420px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:30px;
color:#1e293b;
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#334155;
}

input{
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 8px rgba(37,99,235,0.2);
}

.readonly{
background:#f1f5f9;
}

.btn-group{
display:flex;
gap:15px;
margin-top:20px;
}

.update-btn{
flex:1;
background:#22c55e;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.update-btn:hover{
background:#16a34a;
}

.back-btn{
flex:1;
text-align:center;
text-decoration:none;
background:#64748b;
color:white;
padding:12px;
border-radius:10px;
}

.back-btn:hover{
background:#475569;
}

</style>

</head>
<body>

<div class="form-container">

<h2>✏ Edit Student</h2>

<form action="/update" method="post">

<div class="input-group">
<label>Student ID</label>

<input
type="number"
name="id"
th:value="${student.id}"
readonly
class="readonly">
</div>

<div class="input-group">
<label>Name</label>

<input
type="text"
name="name"
th:value="${student.name}"
required>
</div>

<div class="input-group">
<label>Email</label>

<input
type="email"
name="email"
th:value="${student.email}"
required>
</div>

<div class="input-group">
<label>Course</label>

<input
type="text"
name="course"
th:value="${student.course}"
required>
</div>

<div class="btn-group">

<button type="submit"
class="update-btn">
Update
</button>

<a href="/"
class="back-btn">
Back
</a>

</div>

</form>

</div>

</body>
</html>
